<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Family Quest Editor</title>
  <link rel="stylesheet" href="editor.css">
  <link rel="stylesheet" href="modal.css">
</head>
<body>

  <div class="container">

    <header>
      <button id="openJsonButton" disabled>Open JSON File</button>
      <button id="createJsonButton" disabled>Create New JSON</button>
      <button id="saveJsonButton" class="btn-ghost" disabled>Save JSON File</button>

      <div class="auth-area">
        <button id="loginButton" class="btn-ghost">Login</button>
        <button id="logoutButton" class="btn-ghost">Logout</button>
        <span id="userEmail"></span>
      </div>
      <div id="loadingSpinner" class="hidden">Loading…</div>
    </header>

    <div class="card">
      <div class="row">

        <!-- LEFT COLUMN: Name + photo-cropped stacked -->
        <div class="left-column">
          <div class="combo-wrapper">
            <label for="nameInput">Name:</label>

            <div class="combo-row">
              <div class="combo-box">
                <input id="nameInput" type="text" autocomplete="off">
                <button id="comboArrowButton" title="Select" class="combo-arrow">▼</button>
                <ul id="comboList" class="combo-list hidden"></ul> 
              </div>
              <button id="renameBtn" title="Edit Name" "class="rename-btn">✎</button>
              <button id="newNameBtn" title="Create New">✚</button>
            </div>
            <!-- <ul id="comboList" class="combo-list hidden">➕</ul>  -->
            
          </div>  
          <div class="photo-cropped">
            <canvas id="previewCanvas" width="200" height="200"></canvas>
            <div class="preview-label">Final 200×200 Preview</div>
          </div>

        </div>

        <!-- RIGHT COLUMN: photo-big -->
        <div class="photo-big">
          <div class="canvas-wrapper">
            <canvas id="photoCanvas" width="300" height="300"></canvas>
            <div class="canvas-overlay">Drop or Click</div>
          </div>

          <div class="crop-controls">
            <label>
              <input type="checkbox" id="circleMaskToggle"> Circular Mask
            </label>
            
            <label>Zoom:
              <input type="range" id="zoomSlider" min="0.5" max="3" step="0.01" value="1">
            </label>

            <button class="btn-ghost" id="resetCropperBtn">Reset</button>
            <button class="btn-ghost" id="savePhotoBtn">Crop Photo</button> 
          </div>
        </div>

      </div>
    </div>

    <!-- LOWER CARD -->
    <div class="card">
      <div class="field-label">
        <span id="cardTitle">Card 1:</span>
        <div class="card-nav">
          <button id="prevCardBtn">&lt; Prev</button>
          <button id="nextCardBtn">Next &gt;</button>
          <span id="cardCountLabel">(0 of 0)</span>
        </div>
      </div>

      <div class="two-column">
        <div style="flex:1">
          <div class="field-label"><span id="questionLabel">Question:</span></div>
          <textarea id="questionBox"></textarea>
        </div>
        <div style="flex:1">
          <div class="field-label"><span id="storyLabel">Story:</span></div>
          <textarea id="storyBox"></textarea>
        </div>
      </div>

      <div class="answers-section" id="answersSection">
        <div class="field-label"><span>Answers:</span></div>

        <div class="answer-row">
          <input type="radio" name="correct" value="0" checked>
          <input type="text" id="ans0">
        </div>

        <div class="answer-row">
          <input type="radio" name="correct" value="1">
          <input type="text" id="ans1">
        </div>

        <div class="answer-row">
          <input type="radio" name="correct" value="2">
          <input type="text" id="ans2">
        </div>

        <div class="answer-row">
          <input type="radio" name="correct" value="3">
          <input type="text" id="ans3">
        </div>
      </div>

      <div class="buttons-row">
        <div>
          <button id="saveCardBtn" class="btn-ghost">Save</button>
          <button id="addCardBtn" class="btn-ghost">Add New Card</button>
        </div>
        <button id="deleteCardBtn" class="btn-danger">Delete Card</button>
        <button id="deletePersonBtn" class="btn-danger">Delete Person</button>
      </div>
    </div>

  </div>

  <div id="universalModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2 id="modalTitle"></h2>
      <p id="modalMessage"></p>

      <input id="modalInput" type="text" style="display:none;" />

      <div class="modal-buttons">
        <!-- <button id="modalOkBtn">OK</button>
        <button id="modalCancelBtn">Cancel</button> -->
        <button id="modalButtons"></button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>

<svg width="220" height="260" viewBox="0 0 220 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Perch -->
  <rect x="20" y="200" width="180" height="12" rx="6" fill="#8B5A2B"/>
  <rect x="100" y="210" width="20" height="40" fill="#6E4420"/>

  <!-- Body -->
  <ellipse cx="110" cy="150" rx="40" ry="55" fill="#1E90FF">
    <!-- subtle breathing -->
    <animateTransform attributeName="transform"
      type="scale"
      values="1 1;1.02 0.98;1 1"
      dur="3s"
      repeatCount="indefinite"/>
  </ellipse>

  <!-- Belly (gold) -->
  <ellipse cx="110" cy="165" rx="28" ry="38" fill="#FFD700"/>

  <!-- Wing (left) -->
  <path id="wingLeft" d="M75 140 Q40 160 70 200 Q90 180 85 140 Z" fill="#1560BD">
    <!-- shrug animation -->
    <animateTransform attributeName="transform"
      type="rotate"
      values="0 110 150; -15 110 150; 0 110 150"
      keyTimes="0;0.5;1"
      dur="4.5s"
      repeatCount="indefinite"
      begin="0s"/>
  </path>

  <!-- Wing (right) -->
  <path d="M145 140 Q180 160 150 200 Q130 180 135 140 Z" fill="#1560BD">
    <animateTransform attributeName="transform"
      type="rotate"
      values="0 110 150; 15 110 150; 0 110 150"
      keyTimes="0;0.5;1"
      dur="4.5s"
      repeatCount="indefinite"
      begin="0.5s"/>
  </path>

  <!-- Head group -->
  <g id="head">
    <!-- Head -->
    <circle cx="110" cy="85" r="32" fill="#1E90FF"/>

    <!-- Face patch -->
    <ellipse cx="115" cy="90" rx="18" ry="22" fill="white"/>

    <!-- Eye -->
    <circle cx="120" cy="85" r="4" fill="black">
      <!-- blink -->
      <animate attributeName="r"
        values="4;0.5;4"
        dur="3.5s"
        repeatCount="indefinite"/>
    </circle>

    <!-- Beak -->
    <path d="M130 95 Q150 100 130 115 Q120 110 130 95 Z" fill="#333"/>
    <path d="M130 95 Q150 100 140 90 Q125 85 130 95 Z" fill="#111"/>
  </g>

  <!-- Head idle movement -->
  <animateTransform href="#head"
    attributeName="transform"
    type="rotate"
    values="0 110 100; 8 110 100; -6 110 100; 4 110 100; 0 110 100"
    keyTimes="0;0.25;0.5;0.75;1"
    dur="6s"
    repeatCount="indefinite"/>

  <!-- Feet -->
  <circle cx="95" cy="200" r="4" fill="#444"/>
  <circle cx="125" cy="200" r="4" fill="#444"/>

</svg>